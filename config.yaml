# ──────────────────────────────────────────────────────────────
#  Pipeline Configuration
# ──────────────────────────────────────────────────────────────

# Model used for question metadata classification (domain/language)
mapper_model:
  name: gpt_oss_120b
  url: http://172.17.99.11:30000/v1/chat/completions
  model: openai/gpt-oss-120b
  api_key: AVTXOTWZab9v8WExZMNcGXdCFPCmon4LQPMWP6iS32w2

# Teacher model for CoT generation (gpt-oss-120b)
model:
  name: gpt_oss_120b
  url: http://172.17.99.11:30000/v1/chat/completions
  model: openai/gpt-oss-120b
  api_key: AVTXOTWZab9v8WExZMNcGXdCFPCmon4LQPMWP6iS32w2

# Pipeline defaults
pipeline:
  max_attempts: 2
  temperature: 0.2
  retry_temperature: 0.6
  max_tokens: 8000
  timeout_s: 180
  inter_call_sleep: 0.1
  output_dir: /projects/data/datasets/code_post_training_data/Team_3/Generated_Dataset
  use_llm_domain_classification: true
  # Concurrent batch processing
  max_workers: 8          # number of parallel threads for API calls
  batch_size: 20          # questions per progress update

known_domains:
  - Chemistry
  - Math
  - Physics
  - Biology
  - Language

# Standardized output columns (order matters)
output_schema:
  output_columns:
    - source
    - question
    - solution
    - '<think>'
    - model_answer
    - ground_truth
    - task
    - domain
    - language
    - 'made by'
    - model
    - SFT/reasoning
